<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stepora Shoes</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>

<header class="navbar">
  <div class="logo">Stepora</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Men</a>
    <a href="#">Women</a>
    <a href="#">Kids</a>
  </nav>
</header>

<section class="hero">

  <!-- PAIRE EN ARRIÈRE-PLAN -->
  <div class="hero-bg">
    <img id="heroShoe" src="r1-rouge.jpg" alt="Shoe 3D">
  </div>

  <!-- CONTENU -->
  <div class="hero-content">
    <h1>STEP INTO THE AURA OF STYLE</h1>
    <button>BUY NOW</button>

    <!-- CHOIX DES COULEURS -->
    <div class="color-selector">
      <span class="color-dot active" data-color="white" style="background:#ffffff"></span>
      <span class="color-dot" data-color="black" style="background:#111111"></span>
      <span class="color-dot" data-color="blue" style="background:#3b82f6"></span>
    </div>
  </div>

</section>

<section class="categories">
  <h2>Shop by Categories</h2>

  <div class="cards">
    <div class="product-card">
      <img src="images/shoe-white.png">
      <p>Men</p>
    </div>

    <div class="product-card">
      <img src="images/shoe-blue.png">
      <p>Women</p>
    </div>
  </div>
</section>

<script src="index.js"></script>
</body>
</html>
